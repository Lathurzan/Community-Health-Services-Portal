spring.application.name=chaspJava

spring.datasource.url=jdbc:mysql://localhost:3306/chaspDB
spring.datasource.username=root
spring.datasource.password=REDACTED_DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

server.port=8000

stripe.secret-key=REDACTED_SECRET
stripe.success-url=https://your-frontend-url.com/donation/success?session_id={CHECKOUT_SESSION_ID}
stripe.cancel-url=https://your-frontend-url.com/donation/cancel

paypal.client-id=YOUR_PAYPAL_CLIENT_ID
paypal.client-secret=YOUR_PAYPAL_CLIENT_SECRET
paypal.mode=sandbox
paypal.success-url=https://your-frontend-url.com/donation/success
paypal.cancel-url=https://your-frontend-url.com/donation/cancel
